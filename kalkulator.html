<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Kalkulator Nilai</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="kalkulator.css">
</head>
<body>

<nav>
    <div class="brand">Portofolio Asyla</div>

    <ul>
        <li><a href="index.html">Tentang Saya</a></li>
        <li><a href="kalkulator.html" class="active">Kalkulator Nilai</a></li>
    </ul>
</nav>

<div class="container">

    <div class="card">

        <h2>Kalkulator Nilai Akhir</h2>

        <p>
            Tugas 30% | UTS 30% | UAS 40%
        </p>

        <label>Nilai Tugas</label>
        <input type="number" id="tugas" placeholder="Contoh: 85">

        <label>Nilai UTS</label>
        <input type="number" id="uts" placeholder="Contoh: 80">

        <label>Nilai UAS</label>
        <input type="number" id="uas" placeholder="Contoh: 90">

        <button id="btnHitung">Hitung</button>

        <div id="error"></div>

        <div id="hasil" style="display:none;">
            <h3>Hasil</h3>

            <p id="nilaiAkhir"></p>
            <p id="grade"></p>
        </div>

    </div>

</div>

<script src="kalkulator.js"></script>

</body>
</html>
